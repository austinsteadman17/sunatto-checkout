<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Southern Energy Distributors — Secure Payment</title>
<script src="https://js.stripe.com/v3/"></script>
<style>
  :root {
    --black: #16171B;
    --soft-black: #0A0A0A;
    --white: #FFFFFF;
    --background: #FAFAF9;

    --gray-50: #FAFAFA;
    --gray-100: #F5F5F4;
    --gray-150: #E3E3E6;
    --gray-200: #DFE1E6;
    --gray-300: #C9CBD2;
    --gray-400: #9AA5B1;
    --gray-500: #7D818A;
    --gray-600: #5B5E66;
    --gray-700: #454952;
    --gray-800: #232323;

    --gold: #F2A900;
    --gold-dark: #C98A0A;
    --gold-light: #FDF3D6;

    --green: #1A9A5B;
    --green-light: #E8F7EF;

    --red: #C0392B;
    --red-light: #FDECEA;

    --sp-1: 8px;
    --sp-2: 12px;
    --sp-3: 16px;
    --sp-4: 20px;
    --sp-5: 24px;
    --sp-6: 32px;
    --sp-7: 40px;

    --radius-sm: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--background);
    margin: 0;
    padding: var(--sp-7) var(--sp-3);
    color: var(--black);
    font-size: 14px;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    margin-bottom: var(--sp-5);
    justify-content: center;
  }
  .brand img { height: 28px; width: auto; display: block; }
  .brand span {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--gray-700);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--gray-150);
    border-radius: var(--radius-lg);
    padding: var(--sp-6);
  }

  .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    color: var(--gray-500);
    margin-bottom: var(--sp-1);
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px 0;
    color: var(--black);
  }

  .subtitle {
    color: var(--gray-600);
    font-size: 13px;
    margin-bottom: var(--sp-5);
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    font-size: 14px;
  }
  .row.total {
    font-weight: 700;
    font-size: 16px;
    border-top: 1px solid var(--gray-150);
    margin-top: var(--sp-1);
    padding-top: var(--sp-3);
  }

  label.field-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    color: var(--gray-500);
    margin-bottom: 6px;
  }

  .amount-input-group {
    position: relative;
    margin-bottom: var(--sp-3);
  }
  .amount-input-group .prefix {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-500);
    font-size: 15px;
    pointer-events: none;
  }
  input.amount-input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 10px 12px 10px 26px;
    font-size: 15px;
    font-weight: 700;
    color: var(--black);
    font-family: inherit;
  }
  input.amount-input:focus {
    outline: none;
    border-color: var(--gray-400);
  }
  input.amount-input:disabled {
    background: var(--gray-50);
    color: var(--gray-500);
  }

  #amount-continue-button { margin-bottom: var(--sp-4); }

  .locked-amount {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--gray-50);
    border: 1px solid var(--gray-150);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: var(--sp-4);
  }
  .locked-amount .label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--gray-500);
  }
  .locked-amount .value {
    font-size: 18px;
    font-weight: 700;
    color: var(--black);
  }
  .locked-amount a {
    color: var(--gray-600);
    text-decoration: underline;
  }

  #payment-element { margin: var(--sp-4) 0; }

  button {
    width: 100%;
    padding: 11px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: var(--sp-2);
    font-family: inherit;
    transition: transform 0.05s ease, background 0.1s ease;
  }
  button:active { transform: scale(0.97); }

  #continue-button, #confirm-button, #amount-continue-button {
    background: var(--black);
    color: var(--white);
  }
  #continue-button:disabled, #confirm-button:disabled, #amount-continue-button:disabled {
    background: var(--gray-300);
    cursor: not-allowed;
  }
  #back-button {
    background: var(--white);
    border: 1px solid var(--gray-200);
    color: var(--black);
  }

  .error-message {
    color: var(--red);
    font-size: 13px;
    margin-top: var(--sp-2);
    border-radius: var(--radius-sm);
  }
  .error-message:not(:empty) {
    background: var(--red-light);
    padding: 10px 12px;
  }

  .surcharge-note {
    font-size: 12px;
    color: var(--gold-dark);
    background: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin: var(--sp-2) 0;
  }

  #breakdown-screen, #success-screen, #manual-amount-block, #locked-amount-block, #payment-form {
    display: none;
  }

  #success-screen { text-align: center; }
  .success-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--sp-4);
    color: var(--green);
  }
  #success-screen h2 {
    font-size: 18px;
    margin: 0 0 var(--sp-1);
  }
  #success-detail {
    color: var(--gray-600);
    font-size: 13px;
    line-height: 1.5;
  }

  .footnote {
    font-size: 12px;
    color: var(--gray-500);
    text-align: center;
    line-height: 1.5;
    margin-top: var(--sp-5);
    padding: 0 var(--sp-2);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="sed-logo.png" alt="Southern Energy Distributors" />
      <span>Southern Energy Distributors</span>
    </div>

    <div class="card">
      <!-- Step 1: amount + payment details -->
      <div id="entry-screen">
        <div class="eyebrow" id="page-eyebrow">Payment</div>
        <h1>Amount Due</h1>
        <div class="subtitle" id="page-subtitle"></div>

        <div id="locked-amount-block" class="locked-amount">
          <span class="label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span id="locked-amount-caption">Amount set by Southern Energy Distributors</span>
          </span>
          <span class="value" id="locked-amount-value">$0.00</span>
        </div>

        <div id="manual-amount-block">
          <label class="field-label" for="amount-field">Amount</label>
          <div class="amount-input-group">
            <span class="prefix">$</span>
            <input type="text" inputmode="decimal" id="amount-field" class="amount-input" placeholder="0.00" />
          </div>
          <button id="amount-continue-button" type="button">Continue</button>
        </div>

        <form id="payment-form">
          <div id="payment-element"></div>
          <button id="continue-button" type="submit">Continue</button>
        </form>
        <div class="error-message" id="error-message"></div>
      </div>

      <!-- Step 2: breakdown + explicit confirmation (required disclosure step) -->
      <div id="breakdown-screen">
        <div class="eyebrow">Confirm Payment</div>
        <h1>Review &amp; Pay</h1>
        <div class="subtitle" id="breakdown-subtitle"></div>

        <div class="row"><span>Subtotal</span><span id="bd-subtotal"></span></div>
        <div class="row" id="bd-surcharge-row" style="display:none;"><span id="bd-surcharge-label">Card surcharge (3%)</span><span id="bd-surcharge"></span></div>
        <div class="row total"><span>Total</span><span id="bd-total"></span></div>
        <div class="surcharge-note" id="surcharge-note" style="display:none;">
          A 3% surcharge applies to credit card payments. Paying by bank account (ACH) or debit card has no surcharge.
        </div>
        <button id="confirm-button">Confirm and Pay</button>
        <button id="back-button">Use a different payment method</button>
        <div class="error-message" id="error-message-2"></div>
      </div>

      <!-- Step 3: result -->
      <div id="success-screen">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
        </div>
        <h2>Payment received</h2>
        <p id="success-detail"></p>
      </div>
    </div>

    <div class="footnote" id="footnote"></div>
  </div>

  <script src="checkout.js"></script>
</body>
</html>
